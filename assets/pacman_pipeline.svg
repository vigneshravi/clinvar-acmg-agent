  </defs>
  <style>
    .dot-eaten { fill: #e0e0e0; opacity: 0.4; }
    .dot-pending { fill: #FFD54F; }
    .dot-label { fill: #666; font-size: 11px; font-family: Arial,Helvetica,sans-serif; text-anchor: middle; }
  </style>

  <!-- Eaten dots (completed steps) -->
  <circle cx="50" cy="35" r="8" class="dot-eaten"/>
