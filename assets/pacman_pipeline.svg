<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 90" width="820" height="90">
  <defs>
    <linearGradient id="pg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB300"/>
